<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#000000" />
    <title>Morcéa</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@v0.183.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@v0.183.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="index.js"></script>
  </head>
  <body>
    <button class="waitlist-btn">Join the waitlist</button>

    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <button class="modal-close" id="modalClose">&times;</button>
        <h2>Join the waitlist</h2>
        <form class="modal-form">
          <input type="text" placeholder="First Name" required />
          <input type="text" placeholder="Last Name" required />
          <input type="email" placeholder="Email" required />
          <button type="submit">Submit</button>
        </form>
      </div>
    </div>

    <script>
      const btn = document.querySelector(".waitlist-btn");
      const overlay = document.getElementById("modalOverlay");
      const closeBtn = document.getElementById("modalClose");

      btn.addEventListener("click", () => overlay.classList.add("active"));

      const form = document.querySelector(".modal-form");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const inputs = form.querySelectorAll("input");

        fetch("/api/waitlist", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            firstName: inputs[0].value,
            lastName: inputs[1].value,
            email: inputs[2].value,
          }),
        });

        overlay.classList.remove("active");
        form.reset();
      });
      closeBtn.addEventListener("click", () =>
        overlay.classList.remove("active"),
      );
      overlay.addEventListener("click", (e) => {
        if (e.target === overlay) overlay.classList.remove("active");
      });
    </script>
  </body>
</html>
